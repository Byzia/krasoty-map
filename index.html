<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Красоты Планеты — Карта</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@vkontakte/vk-bridge@2.8.2/dist/browser.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212 !important;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
            background: #121212 !important;
        }

        .leaflet-control-attribution {
            display: none !important;
        }

        /* Иконки меток */
        .custom-pin {
            display: flex !important;
            align-items: center;
            justify-content: center;
            background-color: #1e1e1e !important;
            border: 2px solid #2787F5;
            border-radius: 50%;
            color: #ffffff;
            font-size: 16px;
            box-shadow: 0 0 12px rgba(39, 135, 245, 0.6);
            transition: all 0.2s ease;
        }

        .custom-pin:active {
            transform: scale(1.15);
            border-color: #ffffff;
        }

        /* Кластеры */
        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
            background-color: rgba(39, 135, 245, 0.3) !important;
        }
        .marker-cluster div {
            background-color: #2787F5 !important;
            color: #ffffff !important;
            font-weight: bold;
        }

        /* Popup всплывающая карточка */
        .leaflet-popup-content-wrapper {
            background: #1e1e1e;
            color: #ffffff;
            border-radius: 16px;
            padding: 0;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }

        .leaflet-popup-content {
            margin: 0 !important;
            width: 250px !important;
        }

        .leaflet-popup-tip {
            background: #1e1e1e;
        }

        .popup-card {
            display: flex;
            flex-direction: column;
        }

        .popup-img-wrapper {
            position: relative;
            width: 100%;
            height: 140px;
        }

        .popup-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .popup-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: #fff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        .popup-body {
            padding: 12px;
        }

        .popup-title {
            font-weight: 700;
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .popup-text {
            font-size: 12px;
            color: #b0b0b0;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .popup-link {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, #2787F5 0%, #1e6ed4 100%);
            color: #FFFFFF !important;
            padding: 10px;
            text-decoration: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
        }

        /* Кнопка геолокации */
        .geo-btn {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 9999 !important;
            background: #1e1e1e;
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.2);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.7);
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }

        .geo-btn:active {
            transform: scale(0.9);
            background: #2787F5;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="geo-btn" id="geoBtn">🎯</div>

    <script>
        if (window.vkBridge) {
            vkBridge.send('VKWebAppInit');
        }

        // 1. Инициализация карты
        const map = L.map('map', {
            zoomControl: false,
            minZoom: 2.5,
            maxZoom: 18,
            maxBounds: [[-85, -180], [85, 180]],
            maxBoundsViscosity: 1.0
        }).setView([60.0, 90.0], 3);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 18,
            minZoom: 2
        }).addTo(map);

        // 2. Группа кластеров
        const markersGroup = L.markerClusterGroup({
            showCoverageOnHover: false,
            maxClusterRadius: 50,
            disableClusteringAtZoom: 16
        });

        // 3. Данные из Google Таблицы
        const SHEET_ID = '1IL0rA5nhgrR6PY2kecw2EGmghOttrgGAZ4oU4lQLps8';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        function renderMarkers(data) {
            markersGroup.clearLayers();
            
            data.forEach(place => {
                if (!place.lat || !place.lng) return;

                const iconContent = (place.icon && place.icon.trim() !== '') 
                    ? place.icon 
                    : '📍';

                const customIcon = L.divIcon({
                    className: 'custom-pin',
                    html: iconContent,
                    iconSize: [36, 36],
                    iconAnchor: [18, 18]
                });

                const marker = L.marker([parseFloat(place.lat), parseFloat(place.lng)], { icon: customIcon });

                marker.bindPopup(`
                    <div class="popup-card">
                        <div class="popup-img-wrapper">
                            <img class="popup-img" src="${place.image || 'https://images.unsplash.com/photo-1509316975850-ff9c5deb0cd9'}">
                            <div class="popup-badge">${place.category || 'Локация'}</div>
                        </div>
                        <div class="popup-body">
                            <div class="popup-title">${place.title}</div>
                            <div class="popup-text">${place.description}</div>
                            <a class="popup-link" href="${place.link}" target="_blank">Читать в группе →</a>
                        </div>
                    </div>
                `);

                markersGroup.addLayer(marker);
            });

            map.addLayer(markersGroup);
        }

        async function loadPlacesFromGoogleSheet() {
            try {
                const response = await fetch(SHEET_URL);
                if (!response.ok) {
                    alert(`🔴 Ошибка сети: Гугл вернул статус ${response.status}`);
                    return;
                }

                const text = await response.text();
                
                // Вырезаем JSON ответ от Google
                const jsonText = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);/);
                if (!jsonText || !jsonText[1]) {
                    alert("🔴 Не удалось прочитать формат Google Таблицы. Проверьте настройки доступа!");
                    return;
                }

                const json = JSON.parse(jsonText[1]);
                const rows = json.table.rows;

                if (!rows || rows.length === 0) {
                    alert("🔴 Внимание: Google Таблица пустая или не отдала строки!");
                    return;
                }

                const places = [];

                rows.forEach((row, index) => {
                    const c = row.c;
                    if (!c) return;

                    const getVal = (idx) => (c[idx] && c[idx].v !== undefined && c[idx].v !== null) ? c[idx].v : '';

                    const rawLat = getVal(3);
                    const rawLng = getVal(4);

                    if (rawLat !== '' && rawLng !== '') {
                        const lat = parseFloat(String(rawLat).replace(',', '.').trim());
                        const lng = parseFloat(String(rawLng).replace(',', '.').trim());

                        if (!isNaN(lat) && !isNaN(lng)) {
                            places.push({
                                id: getVal(0) || index + 1,
                                title: getVal(1) || 'Без названия',
                                category: getVal(2) || 'Локация',
                                lat: lat,
                                lng: lng,
                                icon: getVal(5) || '',
                                image: getVal(6) || '',
                                description: getVal(7) || '',
                                link: getVal(8) || 'https://vk.com/krasotyplanety'
                            });
                        }
                    }
                });

                // ДИАГНОСТИКА: Показываем окно при загрузке
                if (places.length === 0) {
                    const firstRow = rows[0].c;
                    const debugData = firstRow.map((cell, i) => `Колонка ${i}: ${cell ? JSON.stringify(cell.v) : 'null'}`).join('\n');
                    alert(`⚠️ Строки есть, но координаты НЕ распознаны!\n\nВот что прочитано из 1-й строки:\n${debugData}`);
                } else {
                    alert(`🎉 УСПЕХ! Распознано меток: ${places.length}.\nШирота: ${places[0].lat}, Долгота: ${places[0].lng}`);
                    renderMarkers(places);
                }

            } catch (error) {
                alert(`🔴 Ошибка скрипта: ${error.message}`);
            }
        }

        loadPlacesFromGoogleSheet();

        // 4. Геолокация
        let userMarker = null;

        function locateUser() {
            if (window.vkBridge && vkBridge.isWebView && vkBridge.isWebView()) {
                vkBridge.send('VKWebAppGetGeodata')
                    .then(data => {
                        if (data && data.available) {
                            setUserLocation(data.lat, data.long);
                        } else {
                            map.locate({setView: true, maxZoom: 10});
                        }
                    })
                    .catch(() => {
                        map.locate({setView: true, maxZoom: 10});
                    });
            } else {
                map.locate({setView: true, maxZoom: 10});
            }
        }

        function setUserLocation(lat, lng) {
            const latlng = [lat, lng];
            map.setView(latlng, 10);

            if (userMarker) {
                map.removeLayer(userMarker);
            }

            userMarker = L.marker(latlng, {
                icon: L.divIcon({
                    className: 'custom-pin',
                    html: '📍',
                    iconSize: [36, 36],
                    iconAnchor: [18, 18]
                })
            }).addTo(map);

            userMarker.bindPopup(`
                <div style="padding: 10px; text-align: center; font-weight: bold; color: #fff;">
                    🎯 Вы находитесь здесь!
                </div>
            `).openPopup();
        }

        document.getElementById('geoBtn').addEventListener('click', locateUser);

        map.on('locationfound', function(e) {
            setUserLocation(e.latlng.lat, e.latlng.lng);
        });
    </script>
</body>
</html>
