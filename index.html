<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Красоты Планеты — Карта</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@vkontakte/vk-bridge@2.8.2/dist/browser.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .leaflet-control-attribution {
            display: none !important;
        }

        /* 🎨 Иконки меток */
        .custom-pin {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(18, 18, 18, 0.9) !important;
            border: 2px solid #2787F5;
            border-radius: 50%;
            color: #ffffff;
            font-size: 18px;
            box-shadow: 0 0 10px rgba(39, 135, 245, 0.5);
        }

        /* 🎨 Кластеры */
        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
            background-color: rgba(39, 135, 245, 0.3) !important;
        }
        .marker-cluster div {
            background-color: #2787F5 !important;
            color: #ffffff !important;
            font-weight: bold;
        }

        /* 📱 Popup карточка */
        .leaflet-popup-content-wrapper {
            background: #1e1e1e;
            color: #ffffff;
            border-radius: 16px;
            padding: 0;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }

        .leaflet-popup-content {
            margin: 0 !important;
            width: 250px !important;
        }

        .leaflet-popup-tip {
            background: #1e1e1e;
        }

        .popup-card {
            display: flex;
            flex-direction: column;
        }

        .popup-img-wrapper {
            position: relative;
            width: 100%;
            height: 140px;
        }

        .popup-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .popup-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: #fff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        .popup-body {
            padding: 12px;
        }

        .popup-title {
            font-weight: 700;
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .popup-text {
            font-size: 12px;
            color: #b0b0b0;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .popup-link {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, #2787F5 0%, #1e6ed4 100%);
            color: #FFFFFF !important;
            padding: 10px;
            text-decoration: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
        }

        /* 📍 Кнопка геопозиции */
        .geo-btn {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            background: #1e1e1e;
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.2);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="geo-btn" onclick="locateUser()">🎯</div>

    <script>
        if (window.vkBridge) {
            vkBridge.send('VKWebAppInit');
        }

        // Карта
        const map = L.map('map', {
            zoomControl: false
        }).setView([60.0, 90.0], 3);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 18
        }).addTo(map);

        // Кластеры
        const markersGroup = L.markerClusterGroup({
            showCoverageOnHover: false,
            maxClusterRadius: 50
        });

        const SHEET_ID = '1IL0rA5nhgrR6PY2kecw2EGmghOttrgGAZ4oU4lQLps8';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        function renderMarkers(data) {
            markersGroup.clearLayers();
            
            data.forEach(place => {
                if (!place.lat || !place.lng) return;

                const customIcon = L.divIcon({
                    className: 'custom-pin',
                    html: place.icon || '📍',
                    iconSize: [36, 36],
                    iconAnchor: [18, 18]
                });

                const marker = L.marker([parseFloat(place.lat), parseFloat(place.lng)], { icon: customIcon });

                marker.bindPopup(`
                    <div class="popup-card">
                        <div class="popup-img-wrapper">
                            <img class="popup-img" src="${place.image || 'https://images.unsplash.com/photo-1509316975850-ff9c5deb0cd9'}">
                            <div class="popup-badge">${place.category || 'Локация'}</div>
                        </div>
                        <div class="popup-body">
                            <div class="popup-title">${place.title}</div>
                            <div class="popup-text">${place.description}</div>
                            <a class="popup-link" href="${place.link}" target="_blank">Читать в группе →</a>
                        </div>
                    </div>
                `);

                markersGroup.addLayer(marker);
            });

            map.addLayer(markersGroup);
        }

        async function loadPlacesFromGoogleSheet() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;

                const places = rows.map((row, index) => {
                    const c = row.c;
                    return {
                        id: (c[0] && c[0].v !== null) ? c[0].v : index + 1,
                        title: (c[1] && c[1].v !== null) ? c[1].v : '',
                        category: (c[2] && c[2].v !== null) ? c[2].v : '',
                        lat: (c[3] && c[3].v !== null) ? c[3].v : null,
                        lng: (c[4] && c[4].v !== null) ? c[4].v : null,
                        icon: (c[5] && c[5].v !== null) ? c[5].v : '',
                        image: (c[6] && c[6].v !== null) ? c[6].v : '',
                        description: (c[7] && c[7].v !== null) ? c[7].v : '',
                        link: (c[8] && c[8].v !== null) ? c[8].v : 'https://vk.com/krasotyplanety'
                    };
                });

                renderMarkers(places);
            } catch (error) {
                console.error('Ошибка загрузки Google Таблицы:', error);
            }
        }

        loadPlacesFromGoogleSheet();

        // Геолокация
        let userMarker = null;

        function locateUser() {
            map.locate({setView: true, maxZoom: 10});
        }

        map.on('locationfound', function(e) {
            if (userMarker) {
                map.removeLayer(userMarker);
            }

            userMarker = L.marker(e.latlng, {
                icon: L.divIcon({
                    className: 'custom-pin',
                    html: '📍',
                    iconSize: [36, 36],
                    iconAnchor: [18, 18]
                })
            }).addTo(map);

            userMarker.bindPopup(`
                <div style="padding: 10px; text-align: center; font-weight: bold; color: #fff;">
                    🎯 Вы находитесь здесь!
                </div>
            `).openPopup();
        });
    </script>
</body>
</html>
