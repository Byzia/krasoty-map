<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Красоты Планеты — Карта</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@vkontakte/vk-bridge@2.8.2/dist/browser.min.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
        }

/* Стиль для групп точек (кластеров) */
        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
            background-color: rgba(39, 135, 245, 0.4) !important;
        }
        .marker-cluster div {
            background-color: #2787F5 !important;
            color: #ffffff !important;
            font-weight: bold;
            font-family: inherit;
        }

        /* Железно скрываем копирайт с иконками */
        .leaflet-control-attribution {
            display: none !important;
        }

        /* 🎨 Новые СТИЛЬНЫЕ кастомные метки под FontAwesome */
        .custom-pin {
            display: flex;
            align-items: center;
            justify-content: center;
            /* Убираем синий фон, делаем его прозрачным */
            background: transparent !important;
            
            /* Делаем аккуратный тонкий синий контур вокруг иконки */
            border: 2px solid #2787F5; 
            border-radius: 50%;
            
            /* Цвет самой иконки */
            color: #ffffff;
            
            /* Размер иконки (можно сделать чуть больше) */
            font-size: 19px; 
            
            /* Светящаяся синяя тень (добавляет глубины) */
            box-shadow: 0 0 10px rgba(39, 135, 245, 0.5), 
                        inset 0 0 8px rgba(39, 135, 245, 0.3);
            
            /* Делаем маркер чуть темнее для лучшей читаемости на карте */
            background-color: rgba(18, 18, 18, 0.8) !important;
            
            transition: all 0.2s ease-out;
        }

        /* Эффект при клике */
        .custom-pin:active {
            transform: scale(1.1);
            background-color: rgba(39, 135, 245, 0.2) !important;
            box-shadow: 0 0 20px rgba(39, 135, 245, 0.8);
        }

        /* 📱 Дизайн всплывающего окна (Popup) */
        .leaflet-popup-content-wrapper {
            background: #1e1e1e;
            color: #ffffff;
            border-radius: 16px;
            padding: 0;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }

        .leaflet-popup-content {
            margin: 0 !important;
            width: 250px !important;
        }

        .leaflet-popup-tip {
            background: #1e1e1e;
        }

        .popup-card {
            display: flex;
            flex-direction: column;
        }

        .popup-img-wrapper {
            position: relative;
            width: 100%;
            height: 140px;
            overflow: hidden;
        }

        .popup-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .popup-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: #fff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        .popup-body {
            padding: 12px;
        }

        .popup-title {
            font-weight: 700;
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .popup-text {
            font-size: 12px;
            color: #b0b0b0;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .popup-link {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, #2787F5 0%, #1e6ed4 100%);
            color: #FFFFFF !important;
            padding: 10px;
            text-decoration: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(39, 135, 245, 0.3);
        }

        /* 📍 Кнопка «Где я» */
        .geo-btn {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            background: #1e1e1e;
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.1);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        .geo-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="geo-btn" onclick="locateUser()">🎯</div>

    <script>
        // Инициализация VK Bridge
        if (window.vkBridge) {
            vkBridge.send('VKWebAppInit');
        }

        // Инициализация карты
        const map = L.map('map', {
            zoomControl: false
        }).setView([60.0, 90.0], 3);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 18
        }).addTo(map);

        // 🗄 Массив данных (Подготовка под подключение Базы Данных на Этапе 2)
        const places = [
            {
                id: 1,
                title: "Чарские пески",
                category: "Пустыня",
                lat: 56.8400,
                lng: 118.2500,
                icon: '<i class="fa-solid fa-mountain-sun"></i>',
                image: "https://sun9-77.vkuserphoto.ru/s/v1/ig2/Ap0_Nih6JEtQD1llJmzgAxJQAkCM5tzyOWCA7pAElot5N4anISCQRjLnEHvJiNIIIbLxlWT0jc6TLvQnTVj8vKXd.jpg?quality=95&as=32x21,48x32,72x48,108x72,160x107,240x160,360x240,480x320,540x360,640x427,720x480,1080x720,1280x853,1440x960,2214x1476&from=bu&u=UJVhd0PXKkCLGDzAcOdX0dqfr9svIrxI5YMqZyp70Zc&cs=2214x0",
                description: "Уникальная пустыня посреди заснеженных гор в Забайкальском крае.",
                link: "https://vk.ru/im/channels/-240261740?cmid=3"
            },
            {
                id: 2,
                title: "Озеро Хиллер",
                category: "Озеро",
                lat: -34.094501,
                lng: 123.203007,
                icon: '<i class="fa-solid fa-water"></i>',
                image: "https://sun9-87.vkuserphoto.ru/s/v1/ig2/E8OrW_pzcu_dTEvjCSPLG_S24O0ldKyTSkvAwJUX1XIPXQu6LCar4-_a5mN_QYia-dqTuAr_sGUD_CNPxclMqTNz.jpg?quality=95&as=32x40,48x60,72x90,108x135,160x200,240x300,360x450,480x600,540x675,640x800,720x900,1080x1350&from=bu&u=uweh17HvZPcRtO9I7QhWBzdwX04br5pzs1XPW60yvu4&cs=1080x0",
                description: "Одно из самых загадочных розовых озёр на планете.",
                link: "https://vk.ru/im/channels/-240261740?cmid=8"
            }
        ];

        // 1. Создаем группу для кластеров
        const markersGroup = L.markerClusterGroup({
            showCoverageOnHover: false, // Отключаем синие линии при наведении
            maxClusterRadius: 50       // Расстояние, на котором точки объединяются
        });

        // 2. Функция отрисовки меток из массива
        function renderMarkers(data) {
            data.forEach(place => {
                const customIcon = L.divIcon({
                    className: 'custom-pin',
                    html: `${place.icon}`,
                    iconSize: [36, 36],
                    iconAnchor: [18, 18]
                });

                const marker = L.marker([place.lat, place.lng], { icon: customIcon });

                marker.bindPopup(`
                    <div class="popup-card">
                        <div class="popup-img-wrapper">
                            <img class="popup-img" src="${place.image}">
                            <div class="popup-badge">${place.category}</div>
                        </div>
                        <div class="popup-body">
                            <div class="popup-title">${place.title}</div>
                            <div class="popup-text">${place.description}</div>
                            <a class="popup-link" href="${place.link}" target="_blank">Читать в группе →</a>
                        </div>
                    </div>
                `);

                // Добавляем маркер НЕ НА КАРТУ, а В ГРУППУ кластеров
                markersGroup.addLayer(marker);
            });

            // Добавляем всю группу кластеров на карту
            map.addLayer(markersGroup);
        }

        // Отрисовываем точки
        renderMarkers(places);

       // Переменная для хранения метки пользователя, чтобы не плодить их при повторных кликах
        let userMarker = null;

        // Функция определения местоположения
        function locateUser() {
            map.locate({setView: true, maxZoom: 10});
        }

        // Когда геопозиция найдена
        map.on('locationfound', function(e) {
            // Если метка уже была на карте — просто удаляем старую
            if (userMarker) {
                map.removeLayer(userMarker);
            }

            // Ставим стильный аккуратный маркер БЕЗ огромного синего овала
            userMarker = L.marker(e.latlng, {
                icon: L.divIcon({
                    className: 'custom-pin',
                    html: '📍',
                    iconSize: [36, 36],
                    iconAnchor: [18, 18]
                })
            }).addTo(map);

            userMarker.bindPopup(`
                <div style="padding: 10px; text-align: center; font-weight: bold; color: #fff;">
                    🎯 Вы находитесь здесь!
                </div>
            `).openPopup();
        });
    </script>

</body>
</html>
