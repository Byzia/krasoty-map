<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Красоты Планеты — Карта</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@vkontakte/vk-bridge@2.8.2/dist/browser.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Исправление бага #2: Делаем подложку страницы темной, а не белой */
            background-color: #121212 !important;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
            /* Цвет фона самой карты при отдалении */
            background: #121212 !important;
        }

        .leaflet-control-attribution {
            display: none !important;
        }

        /* 🎨 Стильные кастомные метки */
        .custom-pin {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(18, 18, 18, 0.85) !important;
            border: 2px solid #2787F5;
            border-radius: 50%;
            color: #ffffff;
            font-size: 18px;
            box-shadow: 0 0 10px rgba(39, 135, 245, 0.5);
            transition: all 0.2s ease;
        }

        .custom-pin:active {
            transform: scale(1.15);
            border-color: #ffffff;
        }

        /* 🎨 Кластеры */
        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
            background-color: rgba(39, 135, 245, 0.3) !important;
        }
        .marker-cluster div {
            background-color: #2787F5 !important;
            color: #ffffff !important;
            font-weight: bold;
        }

        /* 📱 Дизайн Popup */
        .leaflet-popup-content-wrapper {
            background: #1e1e1e;
            color: #ffffff;
            border-radius: 16px;
            padding: 0;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }

        .leaflet-popup-content {
            margin: 0 !important;
            width: 250px !important;
        }

        .leaflet-popup-tip {
            background: #1e1e1e;
        }

        .popup-card {
            display: flex;
            flex-direction: column;
        }

        .popup-img-wrapper {
            position: relative;
            width: 100%;
            height: 140px;
        }

        .popup-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .popup-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: #fff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        .popup-body {
            padding: 12px;
        }

        .popup-title {
            font-weight: 700;
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .popup-text {
            font-size: 12px;
            color: #b0b0b0;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .popup-link {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, #2787F5 0%, #1e6ed4 100%);
            color: #FFFFFF !important;
            padding: 10px;
            text-decoration: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
        }

        /* 📍 Исправление бага #1: Кнопка "Где я" с высоким z-index и надежным откликом */
        .geo-btn {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 9999 !important;
            background: #1e1e1e;
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.2);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.7);
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }

        .geo-btn:active {
            transform: scale(0.9);
            background: #2787F5;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="geo-btn" id="geoBtn">🎯</div>

    <script>
        if (window.vkBridge) {
            vkBridge.send('VKWebAppInit');
        }

        // 1. Инициализация карты без конфликтующих флагов
        const map = L.map('map', {
            zoomControl: false,
            minZoom: 2.5,
            maxZoom: 18,
            maxBounds: [[-85, -180], [85, 180]],
            maxBoundsViscosity: 1.0
        }).setView([60.0, 90.0], 3);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 18,
            minZoom: 2
        }).addTo(map);

        // 2. Группа для кластеров
        const markersGroup = L.markerClusterGroup({
            showCoverageOnHover: false,
            maxClusterRadius: 50,
            disableClusteringAtZoom: 16
        });

        const SHEET_ID = '1IL0rA5nhgrR6PY2kecw2EGmghOttrgGAZ4oU4lQLps8';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        function renderMarkers(data) {
            markersGroup.clearLayers();
            
            data.forEach(place => {
                if (!place.lat || !place.lng) return;

                const customIcon = L.divIcon({
                    className: 'custom-pin',
                    html: place.icon || '<i class="fa-solid fa-location-dot"></i>',
                    iconSize: [36, 36],
                    iconAnchor: [18, 18]
                });

                const marker = L.marker([parseFloat(place.lat), parseFloat(place.lng)], { icon: customIcon });

                marker.bindPopup(`
                    <div class="popup-card">
                        <div class="popup-img-wrapper">
                            <img class="popup-img" src="${place.image || 'https://images.unsplash.com/photo-1509316975850-ff9c5deb0cd9'}">
                            <div class="popup-badge">${place.category || 'Локация'}</div>
                        </div>
                        <div class="popup-body">
                            <div class="popup-title">${place.title}</div>
                            <div class="popup-text">${place.description}</div>
                            <a class="popup-link" href="${place.link}" target="_blank">Читать в группе →</a>
                        </div>
                    </div>
                `);

                markersGroup.addLayer(marker);
            });

            map.addLayer(markersGroup);
        }

        // 6. Усиленная функция загрузки данных из Google Таблицы
        async function loadPlacesFromGoogleSheet() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                
                // Вырезаем JSON
                const jsonText = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);/);
                if (!jsonText || !jsonText[1]) {
                    alert("⚠️ Google отдал ответ в некорректном формате!");
                    return;
                }

                const json = JSON.parse(jsonText[1]);
                const rows = json.table.rows;

                if (!rows || rows.length === 0) {
                    alert("⚠️ Google Таблица пустая или не содержит строк с данными!");
                    return;
                }

                // Выводим сырые данные первой строки для проверки
                const firstRow = rows[0].c;
                const debugInfo = firstRow.map((cell, i) => `Col ${i}: ${cell ? JSON.stringify(cell.v) : 'null'}`).join('\n');
                
                alert("УСПЕХ! Данные получены из таблицы:\n\n" + debugInfo);

                // Отрисовка
                const places = [];
                rows.forEach((row, index) => {
                    const c = row.c;
                    if (!c) return;

                    // Берем значение (проверяем и .v, и прямое значение)
                    const getVal = (idx) => (c[idx] && c[idx].v !== undefined && c[idx].v !== null) ? c[idx].v : '';

                    const rawLat = getVal(3);
                    const rawLng = getVal(4);

                    if (rawLat !== '' && rawLng !== '') {
                        const lat = parseFloat(String(rawLat).replace(',', '.'));
                        const lng = parseFloat(String(rawLng).replace(',', '.'));

                        if (!isNaN(lat) && !isNaN(lng)) {
                            places.push({
                                id: getVal(0) || index + 1,
                                title: getVal(1) || 'Без названия',
                                category: getVal(2) || 'Локация',
                                lat: lat,
                                lng: lng,
                                icon: getVal(5) || '',
                                image: getVal(6) || '',
                                description: getVal(7) || '',
                                link: getVal(8) || 'https://vk.com/krasotyplanety'
                            });
                        }
                    }
                });

                renderMarkers(places);

            } catch (error) {
                alert("🔴 Ошибка сети или скрипта: " + error.message);
            }
        }
    </script>

</body>
</html>
